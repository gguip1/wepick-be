services:
  backend:
    build:
      context: .
    container_name: wepick_be
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wepick_be
      SPRING_DATASOURCE_USERNAME: wepick
      SPRING_DATASOURCE_PASSWORD: wepick
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: wepick_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wepick_be
      MYSQL_USER: wepick
      MYSQL_PASSWORD: wepick
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
